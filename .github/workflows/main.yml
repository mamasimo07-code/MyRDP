name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2022
    timeout-minutes: 3600

    steps:
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389

          Restart-Service TermService -Force

      - name: Create RDP User with Secure Password
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Security

          $charSet = @{
            Upper=[char[]](65..90)
            Lower=[char[]](97..122)
            Number=[char[]](48..57)
            Special=([char[]](33..47)+[char[]](58..64)+[char[]](91..96)+[char[]](123..126))
          }

          $raw=@()
          $raw += $charSet.Upper | Get-Random -Count 4
          $raw += $charSet.Lower | Get-Random -Count 4
          $raw += $charSet.Number | Get-Random -Count 4
          $raw += $charSet.Special | Get-Random -Count 4

          $password=-join ($raw | Sort-Object {Get-Random})

          New-LocalUser -Name RDP -Password (ConvertTo-SecureString $password -AsPlainText -Force) -AccountNeverExpires
          Add-LocalGroupMember Administrators RDP
          Add-LocalGroupMember "Remote Desktop Users" RDP

          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl="https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installer="$env:TEMP\tailscale.msi"

          Invoke-WebRequest $tsUrl -OutFile $installer
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait

      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

          $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

      - name: Verify RDP Accessibility
        run: |
          Test-NetConnection $env:TAILSCALE_IP -Port 3389

      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host ""
          Write-Host "===== RDP INFO ====="
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_PASSWORD"
          Write-Host "===================="

          while ($true) {
            Write-Host "Alive $(Get-Date)"
            Start-Sleep -Seconds 60
