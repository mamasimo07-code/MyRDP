name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-2022
    timeout-minutes: 3600

    steps:
      - name: Enable RDP
        shell: pwsh
        run: |
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service TermService -Force

      - name: Create RDP User
        shell: pwsh
        run: |
          $username = "labadmin"
          $password = "Lab@2026Secure!"

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name $username
          }

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name $username -Password $secure -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $username
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username

      - name: Install Tailscale
        shell: pwsh
        run: |
          $msiUrl = "https://dl.tailscale.com/stable/tailscale-setup-1.98.9-amd64.msi"
          $msiPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest $msiUrl -OutFile $msiPath
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /norestart" -Wait

      - name: Connect Tailscale
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }}

          Start-Sleep -Seconds 10
          $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4

          echo ""
          echo "==========================="
          echo "RDP ADDRESS : $ip"
          echo "USERNAME    : labadmin"
          echo "PASSWORD    : Lab@2026Secure!"
          echo "==========================="

      - name: Keep Runner Alive
        shell: pwsh
        run: |
          while ($true) {
              Start-Sleep -Seconds 300
          }
